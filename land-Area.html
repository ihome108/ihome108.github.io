<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แปลงหน่วยที่ดิน | iHome108</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #fff;
    margin: 0;
}

/* 🔥 Ads */
.ad-box {
    margin: 20px auto;
    max-width: 900px;
    text-align: center;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
}

.container {
    max-width: 900px;
    margin: 20px auto;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
}

h1 {
    text-align: center;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap: 20px;
    margin-top: 20px;
}

.card {
    background: rgba(255,255,255,0.08);
    padding: 20px;
    border-radius: 15px;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

button {
    margin-top: 20px;
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 10px;
    background: #38bdf8;
    color: #000;
    font-size: 18px;
    cursor: pointer;
}

button:hover {
    background: #0ea5e9;
}

.result {
    margin-top: 30px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(0,0,0,0.4);
    text-align: center;
}

.highlight {
    font-size: 24px;
    color: #38bdf8;
    font-weight: bold;
}
</style>
</head>

<body>

<!-- 🔥 Ads Header -->
<div class="ad-box">
    <!-- ใส่โค้ด Adsense ตรงนี้ -->
    ADS HEADER
</div>

<div class="container">
    <h1>📏 แปลงหน่วยที่ดินไทย</h1>

    <div class="grid">
        <div class="card">
            <label>ไร่</label>
            <input type="number" id="rai">
        </div>

        <div class="card">
            <label>งาน</label>
            <input type="number" id="ngan">
        </div>

        <div class="card">
            <label>ตารางวา</label>
            <input type="number" id="wah">
        </div>
    </div>

    <button onclick="calculate()">คำนวณพื้นที่</button>

    <div class="result">
        <div>ผลลัพธ์</div>
        <div class="highlight" id="result">-</div>
    </div>
</div>

<!-- 🔥 Ads กลาง -->
<div class="ad-box">
    ADS CONTENT
</div>

<div class="container">
    <h2>📚 ความรู้เกี่ยวกับหน่วยที่ดิน</h2>
    <p>
        1 ไร่ = 4 งาน = 400 ตารางวา = 1,600 ตารางเมตร<br>
        1 งาน = 100 ตารางวา<br>
        1 ตารางวา = 4 ตารางเมตร
    </p>
</div>

<!-- 🔥 Ads ล่าง -->
<div class="ad-box">
    ADS FOOTER
</div>

<script>
function calculate() {
    let rai = parseFloat(document.getElementById('rai').value) || 0;
    let ngan = parseFloat(document.getElementById('ngan').value) || 0;
    let wah = parseFloat(document.getElementById('wah').value) || 0;

    // 🔥 รวมเป็นตารางวา
    let totalWah = (rai * 400) + (ngan * 100) + wah;

    // 🔥 แปลงเป็นตารางเมตร
    let totalSqm = totalWah * 4;

    document.getElementById('result').innerText =
        `${totalWah.toFixed(2)} ตารางวา | ${totalSqm.toFixed(2)} ตารางเมตร`;
}
</script>

</body>
</html>
