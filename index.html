<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iHome108</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background: linear-gradient(135deg, #020617, #0f172a);
    color:white;
    overflow:hidden;
}

.container{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* Glass Effect Box */
.glass{
    padding:60px 80px;
    border-radius:20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    transition:0.5s;
}

.glass:hover{
    transform:scale(1.03);
    box-shadow: 0 15px 50px rgba(0,0,0,0.5);
}

.title{
    font-size:70px;
    letter-spacing:5px;
    font-weight:300;
    text-transform:uppercase;
    position:relative;
    cursor:pointer;
    transition:0.5s;
}

.title::after{
    content:"";
    position:absolute;
    left:50%;
    bottom:-10px;
    width:0%;
    height:2px;
    background:white;
    transition:0.5s;
    transform:translateX(-50%);
}

.title:hover{
    letter-spacing:10px;
}

.title:hover::after{
    width:80%;
}

.subtitle{
    margin-top:20px;
    font-size:18px;
    color:#cbd5f5;
    letter-spacing:2px;
}

.btn{
    margin-top:40px;
    padding:12px 30px;
    border:1px solid rgba(255,255,255,0.3);
    background:rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    color:white;
    cursor:pointer;
    transition:0.4s;
    letter-spacing:2px;
    border-radius:10px;
}

.btn:hover{
    background:white;
    color:#0f172a;
}

/* Floating light orbs */
.orb{
    position:absolute;
    border-radius:50%;
    filter: blur(60px);
    opacity:0.4;
}

.orb1{
    width:200px;
    height:200px;
    background:#38bdf8;
    top:10%;
    left:20%;
}

.orb2{
    width:250px;
    height:250px;
    background:#6366f1;
    bottom:10%;
    right:20%;
}

</style>
</head>

<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="container">
    <div class="glass">
        <div class="title">iHome108</div>
        <div class="subtitle">IDEAS FOR YOUR PERFECT HOME</div>
        <button class="btn" onclick="enterSite()">ENTER</button>
    </div>
</div>

<script>
function enterSite(){
    // open immediately to avoid popup block
    const newTab = window.open('https://www.ihome108.com', '_blank');

    // animation after click
    const box = document.querySelector('.glass');
    box.style.transform = 'scale(1.1)';
    box.style.opacity = '0';

    // fallback if blocked
    if(!newTab){
        alert('กรุณาอนุญาต Pop-up เพื่อเปิดเว็บไซต์');
    }
},500);
},500);
}
</script>

</body>
</html>
