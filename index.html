<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iHome108</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background:#0f172a;
    color:white;
    overflow:hidden;
}

/* Background Gradient Animation */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background: radial-gradient(circle at center, #1e293b, #020617);
    animation: moveBg 10s infinite alternate;
}

@keyframes moveBg{
    0%{ transform:translate(-10%, -10%);} 
    100%{ transform:translate(10%, 10%);} 
}

.container{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.title{
    font-size:70px;
    letter-spacing:5px;
    font-weight:300;
    text-transform:uppercase;
    position:relative;
    cursor:pointer;
    transition:0.5s;
}

.title::after{
    content:"";
    position:absolute;
    left:50%;
    bottom:-10px;
    width:0%;
    height:2px;
    background:white;
    transition:0.5s;
    transform:translateX(-50%);
}

.title:hover{
    letter-spacing:10px;
}

.title:hover::after{
    width:80%;
}

.subtitle{
    margin-top:20px;
    font-size:18px;
    color:#94a3b8;
    letter-spacing:2px;
}

/* Floating dots */
.dot{
    position:absolute;
    width:5px;
    height:5px;
    background:white;
    border-radius:50%;
    opacity:0.2;
    animation: float 6s infinite ease-in-out;
}

@keyframes float{
    0%{ transform:translateY(0px);} 
    50%{ transform:translateY(-20px);} 
    100%{ transform:translateY(0px);} 
}

.btn{
    margin-top:40px;
    padding:12px 30px;
    border:1px solid white;
    background:transparent;
    color:white;
    cursor:pointer;
    transition:0.4s;
    letter-spacing:2px;
}

.btn:hover{
    background:white;
    color:#0f172a;
}

</style>
</head>

<body>

<div class="container">
    <div>
        <div class="title">iHome108</div>
        <div class="subtitle">IDEAS FOR YOUR PERFECT HOME</div>
        <button class="btn" onclick="enterSite()">ENTER</button>
    </div>
</div>

<script>
// Create floating dots
for(let i=0;i<30;i++){
    let dot = document.createElement('div');
    dot.classList.add('dot');

    dot.style.top = Math.random()*100 + '%';
    dot.style.left = Math.random()*100 + '%';
    dot.style.animationDuration = (Math.random()*5+3)+'s';

    document.body.appendChild(dot);
}

// Button action
function enterSite(){
    document.querySelector('.title').style.transform = 'scale(1.2)';
    document.querySelector('.title').style.opacity = '0';
    setTimeout(()=>{
        alert('Welcome to iHome108');
    },500);
}
</script>

</body>
</html>
